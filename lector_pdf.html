<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Industrial PDF a Excel</title>
    <style>
        :root {
            --blue: #0b1c60;
            --success: #28a745;
            --warning: #ffc107;
        }

        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f2f5;
            padding: 40px 20px;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 700px;
            width: 100%;
            border-top: 5px solid var(--blue);
        }

        h2 {
            color: var(--blue);
        }

        input[type="file"] {
            margin-bottom: 20px;
            border: 2px dashed #ccc;
            padding: 15px;
            width: 80%;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            background: var(--blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin: 5px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: #ccc !important;
            color: #666 !important;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.1rem;
        }

        .btn-excel {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: var(--success);
            color: white !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .btn-excel:hover {
            background: #218838;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>OCR Extractor a Google Sheets</h2>
        <input type="file" id="pdfInput" accept="application/pdf">
        <div>
            <button id="btnSubir" onclick="subirPDF()">1. Subir PDF</button>
            <button id="btnConsultar" onclick="consultarYDescargar()"
                style="background:var(--warning); color:black; display:none;">2. Enviar a Excel</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        // SOLAMENTE la URL de Apps Script
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-G5jwAL4Q8yHvDDQvqjH1EH3b9KHkx14V16PB8L7qDRZUVbyWTpOctm4IQfNTPiRc/exec';
        let fileName = "";

        async function subirPDF() {
            const input = document.getElementById('pdfInput');
            if (input.files.length === 0) return alert("Por favor, selecciona un archivo PDF.");

            fileName = input.files[0].name;
            mostrarStatus("Subiendo archivo a la nube de Google...", "#e9ecef", "#333");
            document.getElementById('btnSubir').disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async () => {
                const base64 = reader.result.split(',')[1];
                
                try {
                    const res = await fetch(APPS_SCRIPT_URL, {
                        method: 'POST',
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify({ accion: "subir", fileName, pdfBase64: base64 }),
                        redirect: 'follow'
                    });
                    
                    const data = await res.json();
                    
                    if (data.status === "procesando") {
                        mostrarStatus("¡Subido! Document AI está escaneando las hojas. Espera 15 segundos...", "var(--success)", "white");
                        
                        // Ocultamos el botón de subir
                        document.getElementById('btnSubir').style.display = "none";
                        
                        // Mostramos el botón de consultar, pero deshabilitado
                        const btnConsultar = document.getElementById('btnConsultar');
                        btnConsultar.style.display = "inline-block";
                        btnConsultar.disabled = true;
                        btnConsultar.innerText = "Procesando... Espere";

                        // Activamos el temporizador de 15 segundos (15000 ms)
                        setTimeout(() => {
                            btnConsultar.disabled = false;
                            btnConsultar.innerText = "2. Enviar a Excel";
                            mostrarStatus("¡Análisis previo terminado! Ahora haz clic en 'Enviar a Excel'.", "var(--blue)", "white");
                        }, 15000);
                    }
                } catch (error) {
                    mostrarStatus("Error de conexión al subir: " + error.message, "#dc3545", "white");
                    document.getElementById('btnSubir').disabled = false;
                }
            };
        }

        async function consultarYDescargar() {
            try {
                // Deshabilitar botón para evitar dobles clics
                document.getElementById('btnConsultar').disabled = true;
                document.getElementById('btnConsultar').innerText = "Guardando...";
                
                mostrarStatus("Procesando datos con IA y escribiendo en Excel...", "var(--warning)", "black");

                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ accion: "consultar", fileName }),
                    redirect: 'follow'
                });
                
                const meta = await res.json();

                if (meta.status === "esperando") {
                    document.getElementById('btnConsultar').disabled = false;
                    document.getElementById('btnConsultar').innerText = "2. Enviar a Excel";
                    return alert("Google sigue escaneando el documento. Intenta de nuevo en 10 segundos.");
                } else if (meta.status === "completado") {
                    
                    // Diseño del mensaje de éxito con el botón al Excel
                    const mensajeExito = `
                        <div style="font-size: 1.2rem; margin-bottom: 10px;">✅ <strong>¡Extracción Exitosa!</strong></div>
                        <div>${meta.mensaje}</div>
                        <a href="${meta.link}" target="_blank" class="btn-excel">
                            Abrir Reporte en Google Sheets
                        </a>
                    `;
                    
                    mostrarStatus(mensajeExito, "#f8f9fa", "#333");
                    document.getElementById('status').style.border = "2px solid var(--success)";
                    document.getElementById('btnConsultar').style.display = "none"; // Ocultamos el botón al terminar
                    
                } else {
                    throw new Error(meta.mensaje || "Error desconocido en el servidor.");
                }
            } catch (error) {
                console.error("Error capturado:", error);
                
                // Si el error es el bloqueo del cortafuegos
                if (error.message.includes("Failed to fetch") || error.message.includes("NetworkError")) {
                    const mensajeFondo = `
                        <div style="font-size: 1.1rem; margin-bottom: 10px;">⏳ <strong>Proceso en Segundo Plano</strong></div>
                        <div>La red pausó la pantalla, ¡pero <b>Google sigue procesando el archivo en la nube!</b></div>
                        <div style="margin-top: 10px; font-weight: normal;">Espera 1 o 2 minutos y revisa directamente tu Excel.</div>
                        <a href="https://docs.google.com/spreadsheets/d/1QhQO5j6U7ECFUWUWR4VGUi0wIp6Gpgh1gilTgfWvGBU/edit" target="_blank" class="btn-excel">
                            Abrir Google Sheets
                        </a>
                    `;
                    mostrarStatus(mensajeFondo, "var(--blue)", "white");
                    document.getElementById('btnConsultar').style.display = "none";
                } else {
                    // Si es un error real
                    mostrarStatus("¡Error!: " + error.message, "#dc3545", "white");
                    document.getElementById('btnConsultar').disabled = false;
                    document.getElementById('btnConsultar').innerText = "2. Enviar a Excel";
                }
            }
        } 

        function mostrarStatus(m, b, c) {
            const s = document.getElementById('status');
            s.style.display = "block"; 
            s.style.background = b; 
            s.style.color = c; 
            s.style.border = "none"; // Resetea el borde por defecto
            s.innerHTML = m;
        }
    </script>
</body>

</html>
